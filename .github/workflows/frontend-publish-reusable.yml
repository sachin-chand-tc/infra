name: Frontend Publish Reusable

on:
  workflow_call:
    inputs:
      site:
        description: Site folder under webinputs/
        required: true
        type: string
      webinputs_ref:
        description: Git ref to deploy from webinputs repo
        required: false
        default: main
        type: string
      redeploy:
        description: Force Cloud Run redeploy after upload
        required: false
        default: true
        type: boolean
      dry_run:
        description: Validate/package only, skip upload
        required: false
        default: false
        type: boolean
    secrets:
      GCP_SA_KEY:
        required: true
      PAT_TOKEN:
        required: true

env:
  GCP_PROJECT_ID: starkindustries-og
  GCS_BUCKET: starkindustries-og-static-an1
  CLOUD_RUN_SERVICE: feedseeker-website
  REGION: asia-northeast1

jobs:
  verify:
    name: Verify Inputs + Site Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Validate requested site
        run: |
          case "${{ inputs.site }}" in
            apnijodi|sachside|planner|sachins|instascraper|qrit) ;;
            *)
              echo "Unsupported site '${{ inputs.site }}'"
              exit 1
              ;;
          esac

      - name: Checkout webinputs
        uses: actions/checkout@v4
        with:
          repository: sachin-chand-tc/webinputs
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.webinputs_ref }}
          path: webinputs

      - name: Check for merge markers
        run: |
          if grep -R --line-number --exclude-dir=.git --exclude-dir=node_modules '<<<<<<< \|=======\|>>>>>>>' "webinputs/${{ inputs.site }}"; then
            echo "Merge conflict markers detected"
            exit 1
          fi

      - name: Block large media artifacts
        run: |
          set -euo pipefail
          BAD=$(find "webinputs/${{ inputs.site }}" -type f \( -name '*.mov' -o -name '*.MOV' -o -name '*.mp4' -o -name '*.MP4' \) | wc -l | tr -d ' ')
          if [[ "$BAD" != "0" ]]; then
            echo "Media artifacts are not allowed in publish payload"
            find "webinputs/${{ inputs.site }}" -type f \( -name '*.mov' -o -name '*.MOV' -o -name '*.mp4' -o -name '*.MP4' \)
            exit 1
          fi

      - name: Require entrypoint
        run: |
          if [[ ! -f "webinputs/${{ inputs.site }}/index.html" ]]; then
            echo "Missing required file: webinputs/${{ inputs.site }}/index.html"
            exit 1
          fi

  publish:
    name: Publish ${{ inputs.site }}
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Checkout webinputs
        uses: actions/checkout@v4
        with:
          repository: sachin-chand-tc/webinputs
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.webinputs_ref }}
          path: webinputs

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Make deploy script executable
        run: chmod +x ./deploy-frontend.sh

      - name: Deploy site with shared script
        env:
          WEBINPUTS_ROOT: ${{ github.workspace }}/webinputs
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
          REGION: ${{ env.REGION }}
        run: |
          set -euo pipefail
          EXTRA_FLAGS=()
          if [[ "${{ inputs.redeploy }}" == "true" ]]; then
            EXTRA_FLAGS+=(--redeploy)
          fi
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            EXTRA_FLAGS+=(--dry-run)
          fi
          ./deploy-frontend.sh --site "${{ inputs.site }}" "${EXTRA_FLAGS[@]}"

      - name: Deployment summary
        run: |
          {
            echo "## Frontend Publish"
            echo "- Site: ${{ inputs.site }}"
            echo "- Source ref: ${{ inputs.webinputs_ref }}"
            echo "- Dry run: ${{ inputs.dry_run }}"
            echo "- Redeploy: ${{ inputs.redeploy }}"
            echo "- GCS object: gs://${{ env.GCS_BUCKET }}/${{ inputs.site }}.tar.gz"
            echo "- Timestamp (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"
