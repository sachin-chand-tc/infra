name: Frontend Publish Reusable

on:
  workflow_call:
    inputs:
      site:
        description: Site folder under webinputs/
        required: true
        type: string
      gcp_project_id:
        description: GCP project ID used for upload and redeploy
        required: false
        default: starkindustries-og
        type: string
      gcs_bucket:
        description: GCS bucket containing frontend tarballs
        required: false
        default: starkindustries-og-static-an1
        type: string
      cloud_run_service:
        description: Cloud Run service that serves frontend assets
        required: false
        default: feedseeker-website
        type: string
      region:
        description: GCP region for Cloud Run service
        required: false
        default: asia-northeast1
        type: string
      webinputs_ref:
        description: Git ref to deploy from webinputs repo
        required: false
        default: main
        type: string
      redeploy:
        description: Force Cloud Run redeploy after upload
        required: false
        default: true
        type: boolean
      dry_run:
        description: Validate/package only, skip upload
        required: false
        default: false
        type: boolean
    secrets:
      GCP_SA_KEY:
        required: true
      PAT_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: frontend-publish-${{ inputs.site }}-${{ inputs.webinputs_ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GCP_PROJECT_ID: ${{ inputs.gcp_project_id }}
  GCS_BUCKET: ${{ inputs.gcs_bucket }}
  CLOUD_RUN_SERVICE: ${{ inputs.cloud_run_service }}
  REGION: ${{ inputs.region }}

jobs:
  verify:
    name: Verify Inputs + Site Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate requested site
        run: |
          case "${{ inputs.site }}" in
            apnijodi|sachside|planner|sachins|instascraper|qrit) ;;
            *)
              echo "Unsupported site '${{ inputs.site }}'"
              exit 1
              ;;
          esac

      - name: Checkout webinputs
        uses: actions/checkout@v4
        with:
          repository: sachin-chand-tc/webinputs
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.webinputs_ref }}
          path: webinputs
          fetch-depth: 1
          persist-credentials: false

      - name: Verify site directory exists
        run: |
          if [[ ! -d "webinputs/${{ inputs.site }}" ]]; then
            echo "Missing site directory: webinputs/${{ inputs.site }}"
            exit 1
          fi

      - name: Check for merge markers
        run: |
          if grep -R --line-number --exclude-dir=.git --exclude-dir=node_modules -E '^(<<<<<<< |=======|>>>>>>> )' "webinputs/${{ inputs.site }}"; then
            echo "Merge conflict markers detected"
            exit 1
          fi

      - name: Block large media artifacts
        run: |
          set -euo pipefail
          BAD=$(find "webinputs/${{ inputs.site }}" -type f \( -name '*.mov' -o -name '*.MOV' -o -name '*.mp4' -o -name '*.MP4' \) | wc -l | tr -d ' ')
          if [[ "$BAD" != "0" ]]; then
            echo "Media artifacts are not allowed in publish payload"
            find "webinputs/${{ inputs.site }}" -type f \( -name '*.mov' -o -name '*.MOV' -o -name '*.mp4' -o -name '*.MP4' \)
            exit 1
          fi

      - name: Require entrypoint
        run: |
          if [[ ! -f "webinputs/${{ inputs.site }}/index.html" ]]; then
            echo "Missing required file: webinputs/${{ inputs.site }}/index.html"
            exit 1
          fi

  publish:
    name: Publish ${{ inputs.site }}
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Preflight required secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          [[ -z "${GCP_SA_KEY}" ]] && missing+=("GCP_SA_KEY")
          [[ -z "${PAT_TOKEN}" ]] && missing+=("PAT_TOKEN")
          if (( ${#missing[@]} > 0 )); then
            echo "Missing required workflow_call secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Checkout infra
        uses: actions/checkout@v4
        with:
          repository: sachin-chand-tc/infra
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          path: infra
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout webinputs
        uses: actions/checkout@v4
        with:
          repository: sachin-chand-tc/webinputs
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ inputs.webinputs_ref }}
          path: webinputs
          fetch-depth: 1
          persist-credentials: false

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify cloud tooling and auth
        run: |
          set -euo pipefail
          gcloud --version
          gsutil version -l | head -n 5
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud auth list

      - name: Preflight billing state
        run: |
          set -euo pipefail
          echo "Checking billing state for project ${GCP_PROJECT_ID}"
          if billing_line=$(gcloud beta billing projects describe "${GCP_PROJECT_ID}" --format='value(billingEnabled,billingAccountName)' 2>/dev/null); then
            billing_enabled=$(echo "${billing_line}" | awk '{print $1}')
            billing_account=$(echo "${billing_line}" | awk '{print $2}')
            if [[ "${billing_enabled}" != "True" ]]; then
              echo "Project ${GCP_PROJECT_ID} has billing disabled (account: ${billing_account:-none})."
              echo "Fix: relink an active billing account, or run this workflow with a different project/bucket/service inputs."
              exit 1
            fi
            echo "Billing enabled for ${GCP_PROJECT_ID} (${billing_account})"
          else
            echo "Warning: could not verify billing state (insufficient permissions or API unavailable). Continuing."
          fi

      - name: Make deploy script executable
        run: chmod +x ./infra/deploy-frontend.sh

      - name: Deploy site with shared script
        env:
          WEBINPUTS_ROOT: ${{ github.workspace }}/webinputs
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          GCS_BUCKET: ${{ env.GCS_BUCKET }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
          REGION: ${{ env.REGION }}
        run: |
          set -euo pipefail
          EXTRA_FLAGS=()
          if [[ "${{ inputs.redeploy }}" == "true" ]]; then
            EXTRA_FLAGS+=(--redeploy)
          fi
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            EXTRA_FLAGS+=(--dry-run)
          fi
          ./infra/deploy-frontend.sh --site "${{ inputs.site }}" "${EXTRA_FLAGS[@]}"

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "## Frontend Publish"
            echo "- Site: ${{ inputs.site }}"
            echo "- Source ref: ${{ inputs.webinputs_ref }}"
            echo "- Dry run: ${{ inputs.dry_run }}"
            echo "- Redeploy: ${{ inputs.redeploy }}"
            echo "- GCS object: gs://${{ env.GCS_BUCKET }}/${{ inputs.site }}.tar.gz"
            echo "- Timestamp (UTC): $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"
